# Supabase local-development configuration for Authently.
# See https://supabase.com/docs/guides/cli/config for the full reference.
#
# `migrations/` here is a symlink to `../packages/db/migrations/`. The Supabase
# CLI reads migrations from `supabase/migrations/`; the canonical source-of-
# truth location (per CLAUDE.md) is `packages/db/migrations/`.

project_id = "authently"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
# Allow our Next.js dev origin (localhost variant) plus path-wildcarded
# callback URLs for /auth/callback?next=… flows. The previous "https"
# entry was a typo; replaced with a usable wildcard list.
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

# Sprint 04 B1 — PKCE-style recovery template (token_hash + verifyOtp at
# /auth/confirm) replacing the legacy implicit-flow default. NOTE: this
# section governs LOCAL templates only. The hosted Supabase Dashboard
# template at Authentication → Email Templates → Reset Password must be
# updated separately to mirror supabase/templates/recovery.html.
[auth.email.template.recovery]
subject = "Reset your Authently password"
content_path = "./supabase/templates/recovery.html"

# Edge functions are out of scope for Sprint 01; disable to keep the local
# stack lean. Re-enable when Step N introduces edge-runtime work.
[edge_runtime]
enabled = false

[analytics]
enabled = false
port = 54327
backend = "postgres"
