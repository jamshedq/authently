<h2>Reset your Authently password</h2>

<p>
  We received a request to reset the password on your Authently account.
  Click the link below to choose a new password.
</p>

<p>
  <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/reset-password">
    Reset password
  </a>
</p>

<p>
  If you didn&rsquo;t request this, you can safely ignore this email — your
  password won&rsquo;t change.
</p>
