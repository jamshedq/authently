name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node 20 deprecation note (2026-04):
# actions/checkout@v4, pnpm/action-setup@v4, and actions/setup-node@v4 still
# bundle Node.js 20 as their JS runtime and emit deprecation warnings.
# Warnings are non-blocking; revisit when these actions ship Node 24 builds
# (likely actions/checkout@v5 etc.). Opting in early via
# `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true` is intentionally NOT set —
# upstream actions haven't certified Node 24 yet, and a forced bump would
# risk breaking CI for a cosmetic warning.

jobs:
  ci:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from the `packageManager` field in root package.json.
        # Setting it here as well triggers a "multiple versions specified" error.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: License headers
        run: pnpm test:license-headers

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  rls:
    name: RLS isolation tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from the `packageManager` field in root package.json.
        # Setting it here as well triggers a "multiple versions specified" error.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: supabase start

      - name: Capture local Supabase env
        run: |
          STATUS=$(supabase status -o env)
          {
            echo "SUPABASE_URL=$(echo "$STATUS" | grep '^API_URL=' | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_ANON_KEY=$(echo "$STATUS" | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_ENV"

      - name: RLS tests
        run: pnpm test:rls
